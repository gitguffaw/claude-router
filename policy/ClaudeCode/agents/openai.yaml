interface:
  display_name: "Claude CLI"
  short_description: "Anthropic Claude second-surface skill for Codex"
  default_prompt: "Use Claude as a real second reasoning and coding surface when the task benefits from independent Claude analysis, planning, long context, model or effort selection, plugins, MCP, browser-backed research, subagents, or ordinary Claude session behavior. Prefer interactive `claude` for parity. For planning-first work, prefer `--permission-mode plan`, `/plan`, or the built-in `Plan` agent. Use `/ultraplan` only when cloud review is specifically desired and the Claude Code on the web plus GitHub prerequisites are satisfied. For deepest reasoning, use `--effort max` or `/effort max`; `ultrathink` is the one-turn hint, not a separate mode. Do not assume a native Claude Code web-search command. For web work, prefer `--chrome` or `/chrome` only when browser automation is appropriate and the Chrome or Edge extension prerequisites are satisfied. Use MCP Tool Search only for MCP tool discovery. Confirm actual availability with `claude --help`, `claude auth status`, `claude agents`, `claude mcp list`, and `claude plugin list` before promising capabilities. Use `scripts/claude_print.py` only when the task specifically needs print-mode or schema-constrained output, and resolve that script path relative to the skill directory rather than the repo cwd."
policy:
  allow_implicit_invocation: true
